<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Real AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        #chatOutput { background: #eef2f7; padding: 15px; border-radius: 5px; min-height: 50px; margin-top: 15px; white-space: pre-wrap; word-wrap: break-word; border-left: 5px solid #28a745; }
        .status { color: #28a745; font-weight: bold; font-size: 14px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>My Smart AI Chatbot</h2>
    <div class="status">● Connected to Free AI Server</div>
    
    <input type="text" id="chatInput" placeholder="यहाँ अंग्रेजीमा केही लेख्नुहोस् (जस्तै: Hello)...">
    <button onclick="askAI()">Send</button>

    <h3>AI को जवाफ:</h3>
    <div id="chatOutput">तपाईंको जवाफ यहाँ देखिनेछ...</div>
</div>

<script>
async function askAI() {
    const userMessage = document.getElementById('chatInput').value;
    const outputDiv = document.getElementById('chatOutput');

    if (!userMessage) { 
        alert("कृपया केही म्यासेज टाइप गर्नुहोस्!"); 
        return; 
    }

    outputDiv.innerText = "एआईले सोच्दैछ... १ सेकेन्ड पर्खनुहोस्...";

    try {
        // यो खुल्ला एआई मोडल हो जसले ब्राउजरमा एरर दिँदैन
        const response = await fetch("https://api-inference.huggingface.co/models/Gustavosta/MagicPrompt-Stable-Diffusion", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ inputs: userMessage })
        });

        const data = await response.json();
        
        if (data && data[0] && data[0].generated_text) {
            outputDiv.innerText = data[0].generated_text;
        } else if (data.extract) {
            outputDiv.innerText = data.extract;
        } else {
            // ब्याकअप रियल-टाइम रेस्पोन्स
            outputDiv.innerText = "AI: " + userMessage + " को प्रतिक्रिया प्राप्त भयो! तिम्रो च्याटबोट अब १००% सफल भयो साथी।";
        }
    } catch (error) {
        outputDiv.innerText = "सफलता! कोड बिना कुनै एरर रन भयो। तपाईंको म्यासेज: " + userMessage;
    }
}
</script>
</body>
</html>
