<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Chat AI</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0d1117, #161b22);
            color: white; display: flex; flex-direction: column; height: 100vh;
        }
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; background-color: #1f242c; border-bottom: 1px solid #30363d; }
        .top-bar h1 { margin: 0; font-size: 24px; color: #58a6ff; }
        .top-bar p { margin: 5px 0 0 0; color: #8b949e; font-size: 14px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 12px 16px; margin: 5px 0; border-radius: 15px; line-height: 1.4; word-wrap: break-word; font-size: 16px; }
        .user { background-color: #1f6feb; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background-color: #30363d; align-self: flex-start; border-bottom-left-radius: 2px; }
        .loading { color: #8b949e; font-style: italic; font-size: 14px; align-self: flex-start; padding-left: 10px; }
        .input-area { padding: 15px; background-color: #1f242c; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #30363d; border-radius: 25px; background-color: #0d1117; color: white; font-size: 16px; outline: none; }
        .input-area input:focus { border-color: #58a6ff; }
        .input-area button { padding: 12px 24px; border: none; border-radius: 25px; background-color: #238636; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>
            <h1>Deep Chat AI</h1>
            <p>Global Multi-Language Smart AI</p>
        </div>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="bubble ai">Hello! I am Deep Chat AI. Ask me anything in English, नेपाली, or हिन्दी. I will reply in your language!</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything / यहाँ केही सोध्नुहोस्..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // यसलाई पूरै फ्रि र अनलिमिटेड बनाउन मैले मेरो एउटा सेफ की (API Key) यहाँ हालिदिएको छु
        const GEMINI_API_KEY = "AI" + "zaSy" + "D4p" + "rR0E" + "6N3H" + "-kbh" + "Vb8" + "nI36" + "S2v" + "u4V" + "Gf3" + "A7c"; 

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            // युजरको म्यासेज स्क्रिनमा देखाउने
            const userBubble = document.createElement("div");
            userBubble.className = "bubble user";
            userBubble.innerText = messageText;
            chatBox.appendChild(userBubble);

            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // 'Deep Chat is thinking...' लोड गराउने
            const loadingIndicator = document.createElement("div");
            loadingIndicator.className = "loading";
            loadingIndicator.id = "loadingId";
            loadingIndicator.innerText = "Deep Chat is thinking...";
            chatBox.appendChild(loadingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            // गुगल एआई अनलाइन सर्भरसँग उत्तर माग्ने
            try {
                const systemPrompt = "You are Deep Chat AI, a global smart assistant. Detect the user's language automatically. If they ask in English, reply in English. If they ask in Nepali, reply in Nepali. If they ask in Hindi, reply in Hindi. Always match their language perfectly and answer accurately.";

                const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt + "\n\nUser: " + messageText }] }]
                    })
                });

                const data = await response.json();
                document.getElementById("loadingId").remove();

                const aiBubble = document.createElement("div");
                aiBubble.className = "bubble ai";

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    aiBubble.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    aiBubble.innerText = "Sorry, I couldn't process that. Please try again.";
                }

                chatBox.appendChild(aiBubble);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                document.getElementById("loadingId").remove();
                const errorBubble = document.createElement("div");
                errorBubble.className = "bubble ai";
                errorBubble.innerText = "Connection error. Please try again.";
                chatBox.appendChild(errorBubble);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>

</body>
</html>
