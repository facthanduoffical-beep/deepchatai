<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Real Gemini AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        #chatOutput { background: #eef2f7; padding: 15px; border-radius: 5px; min-height: 50px; margin-top: 15px; white-space: pre-wrap; word-wrap: break-word; border-left: 5px solid #1a73e8; color: #333; }
        .key-box { background: #fff3cd; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>My Gemini AI Chatbot</h2>
    
    <input type="text" id="apiKeyInput" class="key-box" placeholder="यहाँ आफ्नो Gemini API Key टाँस्नुहोस्">
    
    <input type="text" id="chatInput" placeholder="के सोध्न चाहनुहुन्छ?">
    <button onclick="sendToGemini()">Send Message</button>

    <h3>जेमिनीको वास्तविक जवाफ:</h3>
    <div id="chatOutput">तपाईंको जवाफ यहाँ देखिनेछ...</div>
</div>

<script>
async function sendToGemini() {
    const userMessage = document.getElementById('chatInput').value;
    const userApiKey = document.getElementById('apiKeyInput').value;
    const outputDiv = document.getElementById('chatOutput');

    if (!userApiKey) { alert("कृपया पहिले आफ्नो API Key हाल्नुहोस्!"); return; }
    if (!userMessage) { alert("कृपया केही म्यासेज टाइप गर्नुहोस्!"); return; }

    outputDiv.innerText = "जेमिनीले सोच्दैछ...";

    // यहाँ 'gemini-pro' मोडेल राखेर लिङ्क फिक्स गरिएको छ, जसले एरर दिँदैन
    const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + userApiKey.trim();

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: userMessage
                    }]
                }]
            })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            outputDiv.innerText = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
            outputDiv.innerText = "गुगल एरर: " + data.error.message;
        } else {
            outputDiv.innerText = "केही प्राविधिक त्रुटि भयो। कृपया की (Key) फेरि चेक गर्नुहोस्।";
        }
    } catch (error) {
        outputDiv.innerText = "सर्भर कनेक्ट हुन सकेन।";
        console.error(error);
    }
}
</script>
</body>
</html>
