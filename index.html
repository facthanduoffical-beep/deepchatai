<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Chat AI</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0d1117, #161b22);
            color: white; display: flex; flex-direction: column; height: 100vh;
        }
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; background-color: #1f242c; border-bottom: 1px solid #30363d; }
        .top-bar h1 { margin: 0; font-size: 24px; color: #58a6ff; }
        .top-bar p { margin: 5px 0 0 0; color: gray; font-size: 14px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 12px 16px; margin: 5px 0; border-radius: 15px; line-height: 1.4; word-wrap: break-word; }
        .user { background-color: #1f6feb; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background-color: #30363d; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; background-color: #1f242c; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #30363d; border-radius: 25px; background-color: #0d1117; color: white; font-size: 16px; outline: none; }
        .input-area button { padding: 12px 24px; border: none; border-radius: 25px; background-color: #238636; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>
            <h1>Deep Chat</h1>
            <p>Offline Mobile Smart AI</p>
        </div>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="bubble ai">नमस्ते साथी! मेरो सेन्ड बटन अब चल्ने भयो। मलाई केही सोध न!</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="यहाँ टाइप गर्नुहोस्...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            const userBubble = document.createElement("div");
            userBubble.className = "bubble user";
            userBubble.innerText = messageText;
            chatBox.appendChild(userBubble);

            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                const aiBubble = document.createElement("div");
                aiBubble.className = "bubble ai";
                aiBubble.innerText = "बबाल साथी! तिम्रो म्यासेज मैले पाएँ। तिम्रो एप अब मज्जाले चल्दैछ!";
                chatBox.appendChild(aiBubble);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 400);
        }
    </script>

</body>
</html>
