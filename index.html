<!DOCTYPE html>
<html>
<head>
  <title>My Gemini AI Chatbot</title>
</head>
<body>
  <h2>My Gemini AI Chatbot</h2>

  <input id="apiKey" placeholder="Paste API Key here" style="width: 400px;" />
  <br><br>

  <textarea id="input" placeholder="Type message" rows="5" cols="50"></textarea>
  <br><br>

  <button onclick="sendMessage()">Send Message</button>

  <h3>Gemini's real answer:</h3>
  <pre id="output"></pre>

  <script>
    async function sendMessage() {
      let userText = document.getElementById("input").value;
      let apiKey = document.getElementById("apiKey").value;

      let response = await fetch(
        "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=" + apiKey,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [
              {
                parts: [{ text: userText }]
              }
            ]
          })
        }
      );

      let data = await response.json();

      document.getElementById("output").innerText =
        data.candidates?.[0]?.content?.parts?.[0]?.text
        || JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
