<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Gemini AI Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #chat-box {
      width: 100%;
      max-width: 700px;
      background: #1a1a2e;
      border-radius: 16px;
      padding: 20px;
      min-height: 300px;
      max-height: 450px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      padding: 10px 16px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      font-size: 0.95rem;
    }
    .user { background: #4f46e5; align-self: flex-end; color: white; }
    .bot { background: #1e293b; align-self: flex-start; color: #cbd5e1; border: 1px solid #334155; }
    .input-area { width: 100%; max-width: 700px; display: flex; gap: 10px; }
    #api-key {
      width: 100%;
      max-width: 700px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e0e0f0;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e0e0f0;
      font-size: 1rem;
      outline: none;
    }
    #user-input:focus { border-color: #a78bfa; }
    button {
      padding: 12px 22px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>My Gemini AI Chatbot</h1>
  <input type="password" id="api-key" placeholder="API Key raakhnus..." />
  <div id="chat-box">
    <div class="message bot">Namaste! Ma Gemini AI hun. 😊</div>
  </div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Message lekhnus..."
      onkeydown="if(event.key==='Enter') sendMessage()" />
    <button onclick="sendMessage()" id="send-btn">Send</button>
  </div>

  <script>
    async function sendMessage() {
      const apiKey = document.getElementById('api-key').value.trim();
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const btn = document.getElementById('send-btn');
      const userText = input.value.trim();

      if (!apiKey) { alert('Pahile API Key raakhnus!'); return; }
      if (!userText) return;

      chatBox.innerHTML += '<div class="message user">' + userText + '</div>';
      input.value = '';
      btn.disabled = true;

      const typingEl = document.createElement('div');
      typingEl.className = 'message bot';
      typingEl.textContent = 'Gemini sochda chha...';
      chatBox.appendChild(typingEl);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch(
          'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: userText }] }]
            })
          }
        );
        const data = await response.json();
        typingEl.remove();
        if (data.error) {
          chatBox.innerHTML += '<div class="message bot" style="color:#f87171;">Error: ' + data.error.message + '</div>';
        } else {
          const reply = data.candidates[0].content.parts[0].text;
          chatBox.innerHTML += '<div class="message bot">' + reply + '</div>';
        }
      } catch (err) {
        typingEl.remove();
        chatBox.innerHTML += '<div class="message bot" style="color:#f87171;">Error: ' + err.message + '</div>';
      }

      btn.disabled = false;
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
